<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>扫雷对战 v1.5</title>
  <style>
    :root {
      --bg: #0d1b2a;
      --panel: rgba(9, 17, 33, 0.86);
      --ink: #f4f4f6;
      --muted: rgba(244,244,246,0.7);
      --accent: #3ddc97;
      --danger: #ff5c7a;
      --cell: #1e2a3d;
      --cell-open: #e8edf2;
      --cell-border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "ZCOOL QingKe HuangYou", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: radial-gradient(1100px 700px at 10% 10%, #203a5b 0%, var(--bg) 60%);
      -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    }
    .app { display: grid; grid-template-columns: 1fr 320px; gap: 16px; padding: 16px; height: 100%; }
    .panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px; }
    .meta { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    .pill { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 8px 10px; text-align: center; font-size: 14px; }
    .pill strong { display:block; font-size: 16px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    button { border: none; border-radius: 10px; padding: 8px 12px; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, var(--accent), #6ff1b7); color: #0e1a2b; }
    button.secondary { background: rgba(255,255,255,0.1); color: var(--ink); border: 1px solid rgba(255,255,255,0.2); }
    button.danger { background: linear-gradient(135deg, var(--danger), #ff8fa3); color: #fff; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .grid { display:grid; grid-template-columns: repeat(var(--cols,30), var(--cell,22px)); grid-auto-rows: var(--cell,22px); gap: 2px; padding: 8px; margin-top: 10px;
      background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
      max-width: 100%; overflow: auto; touch-action: manipulation;
    }
    .cell { width: var(--cell,22px); height: var(--cell,22px); display:grid; place-items:center; background: var(--cell); border-radius: 4px; font-weight: 700; font-size: 14px; color:#0e1a2b; border:1px solid var(--cell-border); }
    .cell.open { background: var(--cell-open); border-color: rgba(0,0,0,0.1); }
    .cell.flag { color: #d62828; }
    .cell.mine { background: #ffcad4; }
    .row { display:grid; grid-template-columns: 88px 1fr; gap: 8px; align-items: center; }
    input, select { width:100%; padding: 6px 8px; border-radius: 8px; border:1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: var(--ink); }
    .list { display: grid; gap: 8px; font-size: 13px; }
    .player { padding: 8px; border-radius: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
    .progress { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.1); overflow: hidden; border: 1px solid rgba(255,255,255,0.12); }
    .progress span { display:block; height:100%; background: linear-gradient(90deg, var(--accent), #8bf0c5); width:0%; }
    @media (max-width: 980px) { .app { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel">
      <div class="meta">
        <div class="pill">时间<strong id="time">0.0</strong></div>
        <div class="pill">剩余雷<strong id="mines">99</strong></div>
        <div class="pill">状态<strong id="status">未开始</strong></div>
        <div class="pill">版本<strong id="version">v1.5</strong></div>
      </div>
      <div class="controls">
        <button id="readyBtn">准备</button>
        <button id="startGame" class="secondary">开始游戏</button>
        <button id="restart" class="secondary">重开本局</button>
        <button id="toggleMark" class="secondary">标记模式：关</button>
        <button id="leaveRoom" class="secondary">退出房间</button>
        <button id="disband" class="danger">解散房间</button>
      </div>
      <div class="panel" style="margin-top:10px;">
        <div class="row"><label>玩家名</label><input id="playerName" placeholder="你的名字" /></div>
        <div class="row"><label>房间码</label><input id="roomCode" placeholder="如 ABC123" /></div>
        <div class="controls">
          <button id="createRoom">创建房间</button>
          <button id="joinRoom" class="secondary">加入房间</button>
        </div>
        <div class="row"><label>当前房间</label><div id="roomInfo">未加入</div></div>
        <div class="row"><label>对局数</label><input id="rounds" type="number" min="1" max="20" value="3" /></div>
        <div class="row"><label>人数</label><input id="maxPlayers" type="number" min="2" max="15" value="2" /></div>
      </div>
      <div class="panel" style="margin-top:10px;">
        <div class="row"><label>预设</label>
          <select id="preset">
            <option value="9x9x10">初级 9×9 / 10</option>
            <option value="16x16x40">中级 16×16 / 40</option>
            <option value="16x30x99" selected>高级 16×30 / 99</option>
            <option value="custom">自定义</option>
          </select>
        </div>
        <div class="row"><label>行</label><input id="rows" type="number" min="6" max="30" value="16" /></div>
        <div class="row"><label>列</label><input id="cols" type="number" min="6" max="40" value="30" /></div>
        <div class="row"><label>地雷</label><input id="minesInput" type="number" min="1" max="300" value="99" /></div>
        <div class="controls"><button id="apply">应用自定义</button></div>
      </div>
      <div id="grid" class="grid" aria-label="minesweeper"></div>
      <p style="margin:8px 0;color:var(--muted);font-size:13px;">左键揭开，右键插旗；双击数字可快速打开周围。移动端长按数字格=快速开周围，长按未打开方格=插旗。</p>
    </section>

    <aside class="panel">
      <h3 style="margin:6px 0 10px;">对战进度</h3>
      <div class="list" id="playersList"></div>
      <h3 style="margin:14px 0 8px;">排行榜（最快通关）</h3>
      <div class="list" id="leaderboard"></div>
      <h3 style="margin:14px 0 8px;">历史统计</h3>
      <div class="list" id="stats"></div>
    </aside>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, serverTimestamp, collection, getDocs, increment, deleteDoc }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQ6DcH9_ZQ-_ySHk6yw9TPzMyfXrsDfyU",
      authDomain: "shdvt-minesweeper.firebaseapp.com",
      projectId: "shdvt-minesweeper",
      storageBucket: "shdvt-minesweeper.firebasestorage.app",
      messagingSenderId: "233460568095",
      appId: "1:233460568095:web:5403ca81d654983bd1c52a"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const $ = (id) => document.getElementById(id);
    const gridEl = $("grid");
    const timeEl = $("time");
    const minesEl = $("mines");
    const statusEl = $("status");
    const leaderboardEl = $("leaderboard");
    const statsEl = $("stats");
    const readyBtn = $("readyBtn");
    const restartBtn = $("restart");
    const toggleMarkBtn = $("toggleMark");
    const startGameBtn = $("startGame");
    const disbandBtn = $("disband");
    const leaveRoomBtn = $("leaveRoom");
    const playerNameEl = $("playerName");
    const roomCodeEl = $("roomCode");
    const createRoomBtn = $("createRoom");
    const joinRoomBtn = $("joinRoom");
    const roomInfoEl = $("roomInfo");
    const roundsEl = $("rounds");
    const maxPlayersEl = $("maxPlayers");
    const presetEl = $("preset");
    const rowsEl = $("rows");
    const colsEl = $("cols");
    const minesInputEl = $("minesInput");
    const applyBtn = $("apply");
    const playersListEl = $("playersList");

    const numColors = ["#0000ff", "#008200", "#ff0000", "#000084", "#840000", "#008284", "#000000", "#808080"];
    const LONG_PRESS_MS = 420;

    let config = loadConfig();
    let board = [];
    let started = false;
    let gameOver = false;
    let flags = 0;
    let openCount = 0;
    let timerId = null;
    let elapsed = 0;
    let markMode = false;
    let longPressTimer = null;
    let longPressFired = false;
    let boardArmed = false;
    let roomId = null;
    let isHost = false;
    let roomUnsub = null;
    let playersUnsub = null;
    let playerId = getOrCreatePlayerId();
    let playerDocRef = null;
    let roomDocRef = null;
    let matchStartedAt = null;
    let myDeaths = 0;
    let lastProgressSentAt = 0;
    let playerRowMap = new Map();
    let lastRecordedRoundAt = null;

    function key(r, c) { return `${r}-${c}`; }

    function initBoard() {
      const { rows, cols, mines } = config;
      board = Array.from({ length: rows }, (_, r) =>
        Array.from({ length: cols }, (_, c) => ({ r, c, mine: false, open: false, flag: false, count: 0 }))
      );
      updateGridSize();
      gridEl.innerHTML = "";
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.dataset.r = r;
          cell.dataset.c = c;
          cell.addEventListener("click", onLeftClick);
          cell.addEventListener("dblclick", onDoubleClick);
          cell.addEventListener("contextmenu", onRightClick);
          cell.addEventListener("pointerdown", onPointerDown);
          cell.addEventListener("pointerup", onPointerUp);
          cell.addEventListener("pointercancel", onPointerUp);
          cell.addEventListener("pointerleave", onPointerUp);
          gridEl.appendChild(cell);
        }
      }
      flags = 0;
      openCount = 0;
      boardArmed = false;
      elapsed = 0;
      timeEl.textContent = "0.0";
      minesEl.textContent = mines;
      statusEl.textContent = started ? "进行中" : "未开始";
    }

    function startTimer() {
      if (timerId) return;
      timerId = setInterval(() => {
        if (matchStartedAt) {
          elapsed = Math.min(9999, (Date.now() - matchStartedAt) / 1000);
          timeEl.textContent = elapsed.toFixed(1);
          sendProgress(true);
        }
      }, 100);
    }
    function stopTimer() { clearInterval(timerId); timerId = null; }

    function placeMines(safeR, safeC) {
      const { rows, cols, mines } = config;
      const safe = new Set();
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        const nr = safeR + dr, nc = safeC + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) safe.add(key(nr, nc));
      }
      let placed = 0;
      while (placed < mines) {
        const r = Math.floor(Math.random() * rows);
        const c = Math.floor(Math.random() * cols);
        if (safe.has(key(r, c))) continue;
        const cell = board[r][c];
        if (cell.mine) continue;
        cell.mine = true; placed++;
      }
      for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) board[r][c].count = countMines(r, c);
    }

    function countMines(r, c) {
      const { rows, cols } = config;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc].mine) count++;
      }
      return count;
    }

    function onLeftClick(e) {
      if (gameOver || !started) return;
      if (longPressFired) { longPressFired = false; return; }
      const r = Number(e.currentTarget.dataset.r);
      const c = Number(e.currentTarget.dataset.c);
      if (markMode) return toggleFlag(r, c);
      openCell(r, c);
    }
    function onRightClick(e) { e.preventDefault(); if (gameOver || !started) return; toggleFlag(+e.currentTarget.dataset.r, +e.currentTarget.dataset.c); }
    function onDoubleClick(e) { if (gameOver || !started) return; quickOpenAround(+e.currentTarget.dataset.r, +e.currentTarget.dataset.c); }

    function onPointerDown(e) {
      if (gameOver || !started) return;
      if (e.pointerType !== "touch") return;
      const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
      longPressFired = false;
      longPressTimer = setTimeout(() => {
        const cell = board[r][c];
        if (cell.open && cell.count > 0) quickOpenAround(r, c);
        else toggleFlag(r, c);
        longPressFired = true;
      }, LONG_PRESS_MS);
    }
    function onPointerUp() { clearTimeout(longPressTimer); longPressTimer = null; }

    function toggleFlag(r, c) {
      const cell = board[r][c];
      if (cell.open) return;
      cell.flag = !cell.flag;
      flags += cell.flag ? 1 : -1;
      minesEl.textContent = Math.max(0, config.mines - flags);
      renderCell(cell);
    }

    function openCell(r, c) {
      const cell = board[r][c];
      if (cell.open || cell.flag) return;
      if (!boardArmed) { boardArmed = true; placeMines(r, c); }
      cell.open = true; renderCell(cell); openCount++;
      if (cell.mine) return hitMine();
      if (cell.count === 0) floodOpen(r, c);
      checkWin();
    }

    function floodOpen(r, c) {
      const { rows, cols } = config;
      const stack = [[r, c]];
      const seen = new Set([key(r, c)]);
      while (stack.length) {
        const [cr, cc] = stack.pop();
        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
          const nr = cr + dr, nc = cc + dc;
          if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
          const k = key(nr, nc);
          if (seen.has(k)) continue;
          const cell = board[nr][nc];
          if (cell.flag || cell.open) { seen.add(k); continue; }
          cell.open = true; renderCell(cell); openCount++; seen.add(k);
          if (cell.count === 0 && !cell.mine) stack.push([nr, nc]);
        }
      }
    }

    function quickOpenAround(r, c) {
      const cell = board[r][c];
      if (!cell.open || cell.count === 0) return;
      const { rows, cols } = config;
      let flagCount = 0;
      const neighbors = [];
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
        const n = board[nr][nc];
        neighbors.push(n);
        if (n.flag) flagCount++;
      }
      if (flagCount !== cell.count) return;
      neighbors.forEach(n => { if (!n.flag && !n.open) openCell(n.r, n.c); });
    }

    function winGame() {
      gameOver = true; statusEl.textContent = "胜利"; stopTimer();
      updateStats(true); updateLeaderboard(elapsed, playerNameEl.value.trim()); finishRound();
    }
    function checkWin() { if (openCount === config.rows * config.cols - config.mines) winGame(); }

    function renderCell(cell) {
      const idx = cell.r * config.cols + cell.c;
      const el = gridEl.children[idx];
      el.className = "cell";
      if (cell.open) {
        el.classList.add("open");
        if (cell.mine) { el.classList.add("mine"); el.textContent = "✹"; }
        else if (cell.count > 0) { el.textContent = cell.count; el.style.color = numColors[cell.count - 1]; }
        else el.textContent = "";
      } else if (cell.flag) { el.classList.add("flag"); el.textContent = "⚑"; }
      else el.textContent = "";
    }

    function updateStats(win) {
      const stats = loadStats(); stats.total++; if (win) stats.win++; else stats.lose++; stats.streak = win ? stats.streak + 1 : 0;
      localStorage.setItem(statsKey(), JSON.stringify(stats)); renderStats(stats);
    }
    function loadStats() {
      const raw = localStorage.getItem(statsKey());
      if (!raw) return { total: 0, win: 0, lose: 0, streak: 0 };
      try { return JSON.parse(raw); } catch { return { total: 0, win: 0, lose: 0, streak: 0 }; }
    }
    function renderStats(stats) {
      statsEl.innerHTML = "";
      ["总局数",stats.total,"胜利",stats.win,"失败",stats.lose,"连胜",stats.streak].forEach((v,i,a)=>{
        if(i%2===0){ const d=document.createElement("div"); d.textContent=`${a[i]}：${a[i+1]}`; statsEl.appendChild(d);} });
    }
    function updateLeaderboard(time, winnerName) {
      const board = loadLeaderboard(); board.push({ time, winnerName: winnerName || "玩家", date: new Date().toLocaleString() });
      board.sort((a,b)=>a.time-b.time); const top = board.slice(0,5);
      localStorage.setItem(leaderboardKey(), JSON.stringify(top)); renderLeaderboard(top);
    }
    function loadLeaderboard() { const raw = localStorage.getItem(leaderboardKey()); if (!raw) return []; try { return JSON.parse(raw);} catch { return []; } }
    function renderLeaderboard(list) {
      leaderboardEl.innerHTML = "";
      if (!list.length) { leaderboardEl.textContent = "暂无记录"; return; }
      list.forEach((item, idx) => {
        const el=document.createElement("div");
        const name = item.winnerName || "玩家";
        el.textContent = `#${idx+1}  ${name}  ${item.time.toFixed(1)}s  (${item.date})`;
        leaderboardEl.appendChild(el);
      });
    }

    function statsKey() { return `ms_stats_pvp_${config.rows}x${config.cols}x${config.mines}`; }
    function leaderboardKey() { return `ms_leaderboard_pvp_${config.rows}x${config.cols}x${config.mines}`; }
    function updateGridSize() {
      const cols = config.cols;
      const base = Math.floor(900 / Math.max(1, cols));
      const size = Math.max(22, Math.min(34, base));
      gridEl.style.setProperty("--cols", cols);
      gridEl.style.setProperty("--cell", `${size}px`);
    }
    function loadConfig() { const raw = localStorage.getItem("ms_config_pvp"); if (!raw) return { rows:16, cols:30, mines:99 }; try { return JSON.parse(raw); } catch { return { rows:16, cols:30, mines:99 }; } }
    function saveConfig() { localStorage.setItem("ms_config_pvp", JSON.stringify(config)); }
    function syncConfigInputs() {
      rowsEl.value = config.rows; colsEl.value = config.cols; minesInputEl.value = config.mines;
      const preset = `${config.rows}x${config.cols}x${config.mines}`;
      presetEl.value = ["9x9x10","16x16x40","16x30x99"].includes(preset) ? preset : "custom";
    }
    function applyConfig(rows, cols, mines) {
      const maxMines = rows * cols - 1;
      const safeMines = Math.max(1, Math.min(mines, maxMines));
      config = { rows, cols, mines: safeMines };
      saveConfig(); syncConfigInputs(); initBoard(); renderLeaderboard(loadLeaderboard()); renderStats(loadStats());
    }
    function setDifficultyDisabled(disabled) { presetEl.disabled = disabled; rowsEl.disabled = disabled; colsEl.disabled = disabled; minesInputEl.disabled = disabled; applyBtn.disabled = disabled; }
    function setLobbyDisabled(disabled) { roundsEl.disabled = disabled; maxPlayersEl.disabled = disabled; }

    toggleMarkBtn.addEventListener("click", () => { markMode = !markMode; toggleMarkBtn.textContent = `标记模式：${markMode ? "开" : "关"}`; });
    startGameBtn.addEventListener("click", () => { handleStartGame(); });
    restartBtn.addEventListener("click", () => { if (!started || gameOver) return; resetBoardKeepTime(); });
    disbandBtn.addEventListener("click", () => { if (!roomDocRef) return; if (!isHost) return alert("只有房主可以解散"); updateDoc(roomDocRef, { status: "closed", closedAt: serverTimestamp() }); });
    leaveRoomBtn.addEventListener("click", async () => { if (!roomDocRef || !playerDocRef) return; await leaveRoom(); });

    syncConfigInputs(); initBoard(); renderLeaderboard(loadLeaderboard()); renderStats(loadStats());

    presetEl.addEventListener("change", () => {
      const val = presetEl.value;
      if (val === "custom") return;
      const [r, c, m] = val.split("x").map(Number);
      applyConfig(r, c, m);
      pushRoomDifficulty();
    });
    applyBtn.addEventListener("click", () => {
      const r = Number(rowsEl.value || 16);
      const c = Number(colsEl.value || 30);
      const m = Number(minesInputEl.value || 99);
      applyConfig(r, c, m);
      pushRoomDifficulty();
    });

    readyBtn.addEventListener("click", () => { if (!roomId) return alert("请先创建或加入房间"); if (!playerNameEl.value.trim()) return alert("请输入玩家名"); setReady(true); });

    createRoomBtn.addEventListener("click", async () => {
      if (!playerNameEl.value.trim()) return alert("请输入玩家名");
      const code = makeRoomCode(); roomId = code; isHost = true;
      roomDocRef = doc(db, "rooms", roomId);
      playerDocRef = doc(collection(roomDocRef, "players"), playerId);
      const totalRounds = Math.max(1, Math.min(20, Number(roundsEl.value || 3)));
      const maxPlayers = Math.max(2, Math.min(15, Number(maxPlayersEl.value || 2)));
      const diff = { rows: config.rows, cols: config.cols, mines: config.mines };
      await setDoc(roomDocRef, { roomId, status: "lobby", createdAt: serverTimestamp(), hostId: playerId, hostName: playerNameEl.value.trim(), difficulty: diff, totalRounds, currentRound: 1, maxPlayers });
      await setDoc(playerDocRef, { name: playerNameEl.value.trim(), ready: false, progress: 0, elapsed: 0, deaths: 0, wins: 0 });
      attachRoomListener(); roomInfoEl.textContent = `房间 ${roomId}`; setDifficultyDisabled(false); setLobbyDisabled(false);
    });

    joinRoomBtn.addEventListener("click", async () => {
      if (!playerNameEl.value.trim()) return alert("请输入玩家名");
      const code = roomCodeEl.value.trim().toUpperCase(); if (!code) return alert("请输入房间码");
      roomId = code; roomDocRef = doc(db, "rooms", roomId);
      const snap = await getDoc(roomDocRef); if (!snap.exists()) return alert("房间不存在");
      const data = snap.data(); if (data.status === "closed") return alert("房间已解散");
      const playersRef = collection(roomDocRef, "players");
      const playersSnap = await getDocs(playersRef);
      if (playersSnap.size >= (data.maxPlayers || 2) && !playersSnap.docs.find(d => d.id === playerId)) return alert("房间已满");
      isHost = data.hostId === playerId;
      playerDocRef = doc(collection(roomDocRef, "players"), playerId);
      await setDoc(playerDocRef, { name: playerNameEl.value.trim(), ready: false, progress: 0, elapsed: 0, deaths: 0, wins: 0 }, { merge: true });
      attachRoomListener(); roomInfoEl.textContent = `房间 ${roomId}`; setDifficultyDisabled(true); setLobbyDisabled(true);
    });

    async function setReady(isReady) { if (!playerDocRef) return; await updateDoc(playerDocRef, { ready: isReady, name: playerNameEl.value.trim() }); }

    async function handleStartGame() {
      if (!roomDocRef) return alert("请先创建或加入房间");
      if (!isHost) return alert("只有房主可以开始");
      const playersRef = collection(roomDocRef, "players");
      const snap = await getDocs(playersRef);
      if (snap.size < 2) return alert("至少需要 2 名玩家");
      let allReady = true;
      snap.forEach(docSnap => { if (!docSnap.data().ready) allReady = false; });
      if (!allReady) return alert("仍有玩家未准备");
      await updateDoc(roomDocRef, { status: "started", startedAt: serverTimestamp() });
    }

    function attachRoomListener() {
      if (roomUnsub) roomUnsub();
      roomUnsub = onSnapshot(roomDocRef, (snap) => {
        if (!snap.exists()) return;
        const data = snap.data();
        if (data.status === "closed") { resetLocalRoomState(); alert("房间已解散"); return; }
        if (data.difficulty && !started) applyConfig(data.difficulty.rows, data.difficulty.cols, data.difficulty.mines);
        if (isHost) { setDifficultyDisabled(data.status !== "lobby"); setLobbyDisabled(data.status !== "lobby"); }
        else { setDifficultyDisabled(true); setLobbyDisabled(true); }
        startGameBtn.disabled = !isHost || data.status !== "lobby";
        if (data.status === "started" && data.startedAt && !started) startMatch(data.startedAt.toMillis());
        if (data.status === "round_end" && !gameOver) endRound(false);
        if (data.status === "round_end" && data.winnerTime != null && data.winnerName) {
          const finishedAt = data.finishedAt ? data.finishedAt.toMillis() : null;
          if (!lastRecordedRoundAt || (finishedAt && finishedAt !== lastRecordedRoundAt)) {
            updateLeaderboard(Number(data.winnerTime), data.winnerName);
            lastRecordedRoundAt = finishedAt || Date.now();
          }
        }
        if (data.status === "lobby" && started) resetBoardForNext();
        if (data.status === "finished") endMatch();
        attachPlayersListener();
        if (isHost) maybeStartRound();
      });
    }

    function attachPlayersListener() {
      if (playersUnsub) playersUnsub();
      const playersRef = collection(roomDocRef, "players");
      playersUnsub = onSnapshot(playersRef, (snap) => {
        const players = []; snap.forEach(docSnap => players.push({ id: docSnap.id, ...docSnap.data() }));
        renderPlayers(players);
      });
    }

    function renderPlayers(players) {
      if (!players.length) { playersListEl.textContent = "暂无玩家"; return; }
      playersListEl.textContent = "";
      players.sort((a, b) => (b.wins || 0) - (a.wins || 0));
      const seen = new Set();
      players.forEach(p => {
        const id = p.id;
        seen.add(id);
        let el = playerRowMap.get(id);
        if (!el) {
          el = document.createElement("div");
          el.className = "player";
          el.innerHTML = `
            <div class="rowLine" style="display:flex;justify-content:space-between;gap:6px;">
              <div class="name"></div>
              <div class="meta" style="color:var(--muted);font-size:12px;"></div>
            </div>
            <div class="progress"><span></span></div>
            <div class="detail" style="color:var(--muted);font-size:12px;"></div>
          `;
          playerRowMap.set(id, el);
        }
        const progress = Math.round((p.progress || 0) * 100);
        el.querySelector(".name").textContent = `${p.name || "玩家"} ${p.id === playerId ? "(你)" : ""}`;
        el.querySelector(".meta").textContent = `胜局 ${p.wins || 0}｜${p.ready ? "已就绪" : "未就绪"}`;
        el.querySelector(".progress span").style.width = `${progress}%`;
        el.querySelector(".detail").textContent = `时间 ${Number(p.elapsed || 0).toFixed(1)}s｜失误 ${p.deaths || 0}`;
        playersListEl.appendChild(el);
      });
      Array.from(playerRowMap.keys()).forEach(id => { if (!seen.has(id)) playerRowMap.delete(id); });
    }

    async function maybeStartRound() {
      const playersRef = collection(roomDocRef, "players");
      const snap = await getDocs(playersRef);
      if (snap.size < 2) return;
      let allReady = true;
      snap.forEach(docSnap => { if (!docSnap.data().ready) allReady = false; });
      if (allReady) await updateDoc(roomDocRef, { status: "started", startedAt: serverTimestamp() });
    }

    function startMatch(startedAtMs) {
      started = true; gameOver = false; matchStartedAt = startedAtMs;
      statusEl.textContent = "进行中";
      myDeaths = 0; initBoard(); startTimer(); sendProgress(true);
    }

    function endRound(won) { gameOver = true; statusEl.textContent = won ? "本局胜利" : "本局结束"; stopTimer(); }
    function endMatch() { gameOver = true; stopTimer(); statusEl.textContent = "对战结束"; resetBoardForNext(); }

    async function finishRound() {
      if (!roomDocRef || !playerDocRef) return;
      await updateDoc(playerDocRef, { wins: increment(1) });
      await updateDoc(roomDocRef, { status: "round_end", winnerId: playerId, winnerName: playerNameEl.value.trim(), winnerTime: Number(elapsed.toFixed(1)), finishedAt: serverTimestamp() });
      setTimeout(async () => {
        const roomSnap = await getDoc(roomDocRef); if (!roomSnap.exists()) return;
        const data = roomSnap.data(); const nextRound = (data.currentRound || 1) + 1;
        if (nextRound > (data.totalRounds || 1)) {
          await updateDoc(roomDocRef, { status: "finished", currentRound: nextRound });
        } else {
          await updateDoc(roomDocRef, { status: "lobby", currentRound: nextRound, startedAt: null, winnerId: null });
          resetAllPlayersReady();
        }
      }, 800);
    }

    async function resetAllPlayersReady() {
      const playersRef = collection(roomDocRef, "players");
      const snap = await getDocs(playersRef);
      snap.forEach(docSnap => { updateDoc(docSnap.ref, { ready: false, progress: 0, elapsed: 0, deaths: 0 }); });
      resetBoardForNext();
    }

    function resetBoardForNext() { started = false; gameOver = false; matchStartedAt = null; myDeaths = 0; initBoard(); sendProgress(true); }
    function hitMine() { myDeaths += 1; statusEl.textContent = "踩雷重开"; resetBoardKeepTime(); }

    function resetBoardKeepTime() {
      const { rows, cols, mines } = config;
      board = Array.from({ length: rows }, (_, r) => Array.from({ length: cols }, (_, c) => ({ r, c, mine: false, open: false, flag: false, count: 0 })));
      gridEl.innerHTML = "";
      for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
        const cell = document.createElement("div");
        cell.className = "cell"; cell.dataset.r = r; cell.dataset.c = c;
        cell.addEventListener("click", onLeftClick);
        cell.addEventListener("dblclick", onDoubleClick);
        cell.addEventListener("contextmenu", onRightClick);
        cell.addEventListener("pointerdown", onPointerDown);
        cell.addEventListener("pointerup", onPointerUp);
        cell.addEventListener("pointercancel", onPointerUp);
        cell.addEventListener("pointerleave", onPointerUp);
        gridEl.appendChild(cell);
      }
      flags = 0; openCount = 0; boardArmed = false; minesEl.textContent = mines; sendProgress(true);
    }

    function sendProgress(force = false) {
      if (!playerDocRef || !started || gameOver) return;
      const now = Date.now(); if (!force && now - lastProgressSentAt < 200) return;
      lastProgressSentAt = now;
      const totalSafe = config.rows * config.cols - config.mines;
      const progress = totalSafe > 0 ? openCount / totalSafe : 0;
      updateDoc(playerDocRef, { progress, elapsed, deaths: myDeaths });
    }

    function getOrCreatePlayerId() {
      const key = "ms_player_id";
      let id = localStorage.getItem(key);
      if (!id) { id = Math.random().toString(36).slice(2, 10); localStorage.setItem(key, id); }
      return id;
    }
    function makeRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let code = "";
      for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    }

    async function leaveRoom() {
      if (!roomDocRef || !playerDocRef) return;
      const wasHost = isHost;
      await deleteDoc(playerDocRef);
      if (wasHost) {
        const playersRef = collection(roomDocRef, "players");
        const snap = await getDocs(playersRef);
        if (!snap.empty) {
          const next = snap.docs[0];
          await updateDoc(roomDocRef, { hostId: next.id, hostName: next.data().name || "玩家" });
        } else {
          await updateDoc(roomDocRef, { status: "closed", closedAt: serverTimestamp() });
        }
      }
      resetLocalRoomState();
    }

    function resetLocalRoomState() {
      roomId = null; roomDocRef = null; playerDocRef = null; isHost = false; started = false; gameOver = false; matchStartedAt = null;
      roomInfoEl.textContent = "未加入"; setDifficultyDisabled(false); setLobbyDisabled(false); initBoard();
    }

    async function pushRoomDifficulty() {
      if (!roomDocRef || !isHost) return;
      const roomSnap = await getDoc(roomDocRef);
      if (!roomSnap.exists()) return;
      const data = roomSnap.data();
      if (data.status !== "lobby") return;
      const diff = { rows: config.rows, cols: config.cols, mines: config.mines };
      await updateDoc(roomDocRef, { difficulty: diff });
    }
  </script>
</body>
</html>
