<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>扫雷对战 v1.1</title>
  <style>
    :root {
      --bg1: #0d1b2a;
      --bg2: #1b263b;
      --panel: rgba(9, 17, 33, 0.8);
      --ink: #f4f4f6;
      --muted: rgba(244,244,246,0.7);
      --accent: #3ddc97;
      --danger: #ff5c7a;
      --cell: #1e2a3d;
      --cell-open: #e8edf2;
      --cell-border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "ZCOOL QingKe HuangYou", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: radial-gradient(1200px 800px at 15% 10%, #223a5b 0%, var(--bg1) 45%),
                  radial-gradient(900px 700px at 85% 85%, #14223b 0%, var(--bg2) 55%);
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    .app {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(260px, 340px);
      gap: 18px;
      padding: 18px;
      height: 100%;
    }
    .board-wrap {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      display: grid;
      gap: 12px;
      align-content: start;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 10px;
    }
    .pill {
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
      font-size: 15px;
    }
    .pill strong { display: block; font-size: 18px; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; }
    .lobby {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .row { display: grid; grid-template-columns: 90px 1fr; gap: 8px; align-items: center; }
    .row input { width: 100%; }
    .difficulty {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 8px;
    }
    .difficulty select, .difficulty input, .row input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: var(--ink);
      font-weight: 600;
      outline: none;
    }
    .difficulty label { font-size: 12px; color: var(--muted); }
    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #6ff1b7);
      color: #0e1a2b;
    }
    button.secondary {
      background: rgba(255,255,255,0.1);
      color: var(--ink);
      border: 1px solid rgba(255,255,255,0.2);
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .grid {
      display: grid;
      grid-template-columns: repeat(var(--cols, 30), var(--cell-size, 22px));
      grid-auto-rows: var(--cell-size, 22px);
      gap: 2px;
      justify-content: center;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: auto;
      max-width: 100%;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    .cell {
      width: var(--cell-size, 22px);
      height: var(--cell-size, 22px);
      display: grid;
      place-items: center;
      background: var(--cell);
      border-radius: 4px;
      font-size: 15px;
      font-weight: 700;
      color: #0e1a2b;
      user-select: none;
      border: 1px solid var(--cell-border);
      touch-action: manipulation;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .cell.open { background: var(--cell-open); border-color: rgba(0,0,0,0.1); }
    .cell.flag { color: #d62828; }
    .cell.mine { background: #ffcad4; }
    .sidebar {
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .card {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h2 { margin: 6px 0 8px; font-size: 18px; }
    p { margin: 6px 0; color: var(--muted); }
    .list { display: grid; gap: 6px; font-size: 14px; }
    .legend { display: grid; gap: 6px; font-size: 14px; color: var(--muted); }
    .legend span { color: var(--ink); }
    .progress {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .progress span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #8bf0c5);
      width: 0%;
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="board-wrap">
      <div class="meta">
        <div class="pill">时间<strong id="time">0.0</strong></div>
        <div class="pill">剩余雷<strong id="mines">99</strong></div>
        <div class="pill">状态<strong id="status">未开始</strong></div>
        <div class="pill">版本<strong id="version">v1.1</strong></div>
      </div>
      <div class="controls">
        <button id="readyBtn">准备</button>
        <button id="restart" class="secondary">重开本局</button>
        <button id="toggleMark" class="secondary">标记模式：关</button>
      </div>
      <div class="lobby">
        <div class="row">
          <label>玩家名</label>
          <input id="playerName" placeholder="你的名字" />
        </div>
        <div class="row">
          <label>房间码</label>
          <input id="roomCode" placeholder="如 ABC123" />
        </div>
        <div class="controls">
          <button id="createRoom">创建房间</button>
          <button id="joinRoom" class="secondary">加入房间</button>
        </div>
        <div class="row">
          <label>当前房间</label>
          <div id="roomInfo">未加入</div>
        </div>
      </div>
      <div class="difficulty">
        <div>
          <label for="preset">难度预设</label>
          <select id="preset">
            <option value="9x9x10">初级 9×9 / 10</option>
            <option value="16x16x40">中级 16×16 / 40</option>
            <option value="16x30x99" selected>高级 16×30 / 99</option>
            <option value="custom">自定义</option>
          </select>
        </div>
        <div>
          <label for="rows">行</label>
          <input id="rows" type="number" min="6" max="30" value="16" />
        </div>
        <div>
          <label for="cols">列</label>
          <input id="cols" type="number" min="6" max="40" value="30" />
        </div>
        <div>
          <label for="minesInput">地雷</label>
          <input id="minesInput" type="number" min="1" max="300" value="99" />
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="apply">应用自定义</button>
        </div>
      </div>
      <div id="grid" class="grid" aria-label="minesweeper"></div>
      <p>左键揭开，右键插旗；双击数字可快速打开周围。移动端长按数字格=快速开周围，长按未打开方格=插旗。</p>
    </section>

    <aside class="sidebar">
      <div class="card">
        <h2>对战进度</h2>
        <div class="list">
          <div>你：<span id="youName">-</span>（<span id="youStatus">未就绪</span>）</div>
          <div class="progress"><span id="youProgress"></span></div>
          <div>时间：<span id="youTime">0.0</span>s｜失误：<span id="youDeaths">0</span></div>
        </div>
        <div class="list" style="margin-top:10px;">
          <div>对手：<span id="opName">-</span>（<span id="opStatus">未就绪</span>）</div>
          <div class="progress"><span id="opProgress"></span></div>
          <div>时间：<span id="opTime">0.0</span>s｜失误：<span id="opDeaths">0</span></div>
        </div>
      </div>
      <div class="card">
        <h2>排行榜（最快通关）</h2>
        <div class="list" id="leaderboard"></div>
      </div>
      <div class="card">
        <h2>历史统计</h2>
        <div class="list" id="stats"></div>
      </div>
      <div class="card">
        <h2>玩法说明</h2>
        <div class="legend">
          <div><span>目标：</span>不触雷的前提下排查出全部地雷，先完成者获胜。</div>
          <div><span>数字：</span>表示周围 8 格中的地雷数量。</div>
          <div><span>连开：</span>点开空格会尽量展开无雷区域，双击数字可快速开周围。</div>
          <div><span>移动端：</span>长按数字格=快速开周围；长按未打开方格=插旗。</div>
          <div><span>对战：</span>双方确认同难度后开始，踩雷会重开但计时不重置。</div>
        </div>
      </div>
    </aside>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot,
      serverTimestamp, collection
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQ6DcH9_ZQ-_ySHk6yw9TPzMyfXrsDfyU",
      authDomain: "shdvt-minesweeper.firebaseapp.com",
      projectId: "shdvt-minesweeper",
      storageBucket: "shdvt-minesweeper.firebasestorage.app",
      messagingSenderId: "233460568095",
      appId: "1:233460568095:web:5403ca81d654983bd1c52a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const gridEl = document.getElementById("grid");
    const timeEl = document.getElementById("time");
    const minesEl = document.getElementById("mines");
    const statusEl = document.getElementById("status");
    const leaderboardEl = document.getElementById("leaderboard");
    const statsEl = document.getElementById("stats");
    const restartBtn = document.getElementById("restart");
    const toggleMarkBtn = document.getElementById("toggleMark");
    const presetEl = document.getElementById("preset");
    const rowsEl = document.getElementById("rows");
    const colsEl = document.getElementById("cols");
    const minesInputEl = document.getElementById("minesInput");
    const applyBtn = document.getElementById("apply");
    const readyBtn = document.getElementById("readyBtn");
    const playerNameEl = document.getElementById("playerName");
    const roomCodeEl = document.getElementById("roomCode");
    const createRoomBtn = document.getElementById("createRoom");
    const joinRoomBtn = document.getElementById("joinRoom");
    const roomInfoEl = document.getElementById("roomInfo");
    const youNameEl = document.getElementById("youName");
    const opNameEl = document.getElementById("opName");
    const youStatusEl = document.getElementById("youStatus");
    const opStatusEl = document.getElementById("opStatus");
    const youProgressEl = document.getElementById("youProgress");
    const opProgressEl = document.getElementById("opProgress");
    const youTimeEl = document.getElementById("youTime");
    const opTimeEl = document.getElementById("opTime");
    const youDeathsEl = document.getElementById("youDeaths");
    const opDeathsEl = document.getElementById("opDeaths");

    const numColors = ["#0000ff", "#008200", "#ff0000", "#000084", "#840000", "#008284", "#000000", "#808080"];

    let config = loadConfig();
    let board = [];
    let started = false;
    let gameOver = false;
    let flags = 0;
    let openCount = 0;
    let timerId = null;
    let elapsed = 0;
    let markMode = false;
    let longPressTimer = null;
    let longPressFired = false;
    let boardArmed = false;
    const LONG_PRESS_MS = 420;
    let roomId = null;
    let isHost = false;
    let roomUnsub = null;
    let playerId = getOrCreatePlayerId();
    let playerDocRef = null;
    let roomDocRef = null;
    let matchStartedAt = null;
    let myDeaths = 0;
    let lastProgressSentAt = 0;

    function key(r, c) { return `${r}-${c}`; }

    function initBoard() {
      const { rows, cols, mines } = config;
      board = Array.from({ length: rows }, (_, r) =>
        Array.from({ length: cols }, (_, c) => ({ r, c, mine: false, open: false, flag: false, count: 0 }))
      );
      updateGridSize();
      gridEl.innerHTML = "";
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.dataset.r = r;
          cell.dataset.c = c;
          cell.addEventListener("click", onLeftClick);
          cell.addEventListener("dblclick", onDoubleClick);
          cell.addEventListener("contextmenu", onRightClick);
          cell.addEventListener("pointerdown", onPointerDown);
          cell.addEventListener("pointerup", onPointerUp);
          cell.addEventListener("pointercancel", onPointerUp);
          cell.addEventListener("pointerleave", onPointerUp);
          gridEl.appendChild(cell);
        }
      }
      flags = 0;
      openCount = 0;
      boardArmed = false;
      elapsed = 0;
      timeEl.textContent = "0.0";
      minesEl.textContent = mines;
      statusEl.textContent = started ? "进行中" : "未开始";
    }

    function startTimer() {
      if (timerId) return;
      timerId = setInterval(() => {
        if (matchStartedAt) {
          elapsed = Math.min(9999, (Date.now() - matchStartedAt) / 1000);
          timeEl.textContent = elapsed.toFixed(1);
          youTimeEl.textContent = elapsed.toFixed(1);
          sendProgress(true);
        }
      }, 100);
    }

    function stopTimer() {
      clearInterval(timerId);
      timerId = null;
    }

    function placeMines(safeR, safeC) {
      const { rows, cols, mines } = config;
      const safe = new Set();
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const nr = safeR + dr;
          const nc = safeC + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) safe.add(key(nr, nc));
        }
      }
      let placed = 0;
      while (placed < mines) {
        const r = Math.floor(Math.random() * rows);
        const c = Math.floor(Math.random() * cols);
        if (safe.has(key(r, c))) continue;
        const cell = board[r][c];
        if (cell.mine) continue;
        cell.mine = true;
        placed++;
      }
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          board[r][c].count = countMines(r, c);
        }
      }
    }

    function countMines(r, c) {
      const { rows, cols } = config;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (!dr && !dc) continue;
          const nr = r + dr;
          const nc = c + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc].mine) count++;
        }
      }
      return count;
    }

    function onLeftClick(e) {
      if (gameOver || !started) return;
      if (longPressFired) {
        longPressFired = false;
        return;
      }
      const r = Number(e.currentTarget.dataset.r);
      const c = Number(e.currentTarget.dataset.c);
      if (markMode) return toggleFlag(r, c);
      openCell(r, c);
    }

    function onRightClick(e) {
      e.preventDefault();
      if (gameOver || !started) return;
      const r = Number(e.currentTarget.dataset.r);
      const c = Number(e.currentTarget.dataset.c);
      toggleFlag(r, c);
    }

    function onDoubleClick(e) {
      if (gameOver || !started) return;
      const r = Number(e.currentTarget.dataset.r);
      const c = Number(e.currentTarget.dataset.c);
      quickOpenAround(r, c);
    }

    function onPointerDown(e) {
      if (gameOver || !started) return;
      if (e.pointerType !== "touch") return;
      const r = Number(e.currentTarget.dataset.r);
      const c = Number(e.currentTarget.dataset.c);
      longPressFired = false;
      longPressTimer = setTimeout(() => {
        const cell = board[r][c];
        if (cell.open && cell.count > 0) {
          quickOpenAround(r, c);
        } else {
          toggleFlag(r, c);
        }
        longPressFired = true;
      }, LONG_PRESS_MS);
    }

    function onPointerUp() {
      clearTimeout(longPressTimer);
      longPressTimer = null;
    }

    function toggleFlag(r, c) {
      const cell = board[r][c];
      if (cell.open) return;
      cell.flag = !cell.flag;
      flags += cell.flag ? 1 : -1;
      minesEl.textContent = Math.max(0, config.mines - flags);
      renderCell(cell);
    }

    function openCell(r, c) {
      const cell = board[r][c];
      if (cell.open || cell.flag) return;
      if (!boardArmed) {
        boardArmed = true;
        placeMines(r, c);
      }
      cell.open = true;
      renderCell(cell);
      openCount++;
      if (cell.mine) return hitMine();
      if (cell.count === 0) floodOpen(r, c);
      checkWin();
    }

    function floodOpen(r, c) {
      const { rows, cols } = config;
      const stack = [[r, c]];
      const seen = new Set([key(r, c)]);
      while (stack.length) {
        const [cr, cc] = stack.pop();
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            const nr = cr + dr;
            const nc = cc + dc;
            if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
            const k = key(nr, nc);
            if (seen.has(k)) continue;
            const cell = board[nr][nc];
            if (cell.flag || cell.open) { seen.add(k); continue; }
            cell.open = true;
            renderCell(cell);
            openCount++;
            seen.add(k);
            if (cell.count === 0 && !cell.mine) stack.push([nr, nc]);
          }
        }
      }
    }

    function quickOpenAround(r, c) {
      const cell = board[r][c];
      if (!cell.open || cell.count === 0) return;
      const { rows, cols } = config;
      let flagCount = 0;
      const neighbors = [];
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (!dr && !dc) continue;
          const nr = r + dr;
          const nc = c + dc;
          if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
          const n = board[nr][nc];
          neighbors.push(n);
          if (n.flag) flagCount++;
        }
      }
      if (flagCount !== cell.count) return;
      neighbors.forEach(n => {
        if (!n.flag && !n.open) openCell(n.r, n.c);
      });
    }

    function winGame() {
      gameOver = true;
      statusEl.textContent = "胜利";
      stopTimer();
      updateStats(true);
      updateLeaderboard(elapsed);
      finishMatch();
    }

    function checkWin() {
      if (openCount === config.rows * config.cols - config.mines) winGame();
    }

    function renderCell(cell) {
      const idx = cell.r * config.cols + cell.c;
      const el = gridEl.children[idx];
      el.className = "cell";
      if (cell.open) {
        el.classList.add("open");
        if (cell.mine) {
          el.classList.add("mine");
          el.textContent = "✹";
        } else if (cell.count > 0) {
          el.textContent = cell.count;
          el.style.color = numColors[cell.count - 1];
        } else {
          el.textContent = "";
        }
      } else if (cell.flag) {
        el.classList.add("flag");
        el.textContent = "⚑";
      } else {
        el.textContent = "";
      }
    }

    function updateStats(win) {
      const stats = loadStats();
      stats.total++;
      if (win) stats.win++; else stats.lose++;
      stats.streak = win ? stats.streak + 1 : 0;
      saveStats(stats);
      renderStats(stats);
    }

    function loadStats() {
      const raw = localStorage.getItem(statsKey());
      if (!raw) return { total: 0, win: 0, lose: 0, streak: 0 };
      try { return JSON.parse(raw); } catch { return { total: 0, win: 0, lose: 0, streak: 0 }; }
    }

    function saveStats(stats) {
      localStorage.setItem(statsKey(), JSON.stringify(stats));
    }

    function renderStats(stats) {
      statsEl.innerHTML = "";
      statsEl.append(
        infoRow("总局数", stats.total),
        infoRow("胜利", stats.win),
        infoRow("失败", stats.lose),
        infoRow("连胜", stats.streak)
      );
    }

    function updateLeaderboard(time) {
      const board = loadLeaderboard();
      board.push({ time, date: new Date().toLocaleString() });
      board.sort((a, b) => a.time - b.time);
      const top = board.slice(0, 5);
      localStorage.setItem(leaderboardKey(), JSON.stringify(top));
      renderLeaderboard(top);
    }

    function loadLeaderboard() {
      const raw = localStorage.getItem(leaderboardKey());
      if (!raw) return [];
      try { return JSON.parse(raw); } catch { return []; }
    }

    function renderLeaderboard(list) {
      leaderboardEl.innerHTML = "";
      if (!list.length) {
        leaderboardEl.textContent = "暂无记录";
        return;
      }
      list.forEach((item, idx) => {
        const el = document.createElement("div");
        el.textContent = `#${idx + 1}  ${item.time.toFixed(1)}s  (${item.date})`;
        leaderboardEl.appendChild(el);
      });
    }

    function infoRow(label, value) {
      const el = document.createElement("div");
      el.textContent = `${label}：${value}`;
      return el;
    }

    function statsKey() {
      return `ms_stats_pvp_${config.rows}x${config.cols}x${config.mines}`;
    }

    function leaderboardKey() {
      return `ms_leaderboard_pvp_${config.rows}x${config.cols}x${config.mines}`;
    }

    function updateGridSize() {
      const cols = config.cols;
      const base = Math.floor(900 / Math.max(1, cols));
      const size = Math.max(22, Math.min(34, base));
      gridEl.style.setProperty("--cols", cols);
      gridEl.style.setProperty("--cell-size", `${size}px`);
    }

    function loadConfig() {
      const raw = localStorage.getItem("ms_config_pvp");
      if (!raw) return { rows: 16, cols: 30, mines: 99 };
      try { return JSON.parse(raw); } catch { return { rows: 16, cols: 30, mines: 99 }; }
    }

    function saveConfig() {
      localStorage.setItem("ms_config_pvp", JSON.stringify(config));
    }

    function syncConfigInputs() {
      rowsEl.value = config.rows;
      colsEl.value = config.cols;
      minesInputEl.value = config.mines;
      const preset = `${config.rows}x${config.cols}x${config.mines}`;
      presetEl.value = ["9x9x10","16x16x40","16x30x99"].includes(preset) ? preset : "custom";
    }

    function applyConfig(rows, cols, mines) {
      const maxMines = rows * cols - 1;
      const safeMines = Math.max(1, Math.min(mines, maxMines));
      config = { rows, cols, mines: safeMines };
      saveConfig();
      syncConfigInputs();
      initBoard();
      renderLeaderboard(loadLeaderboard());
      renderStats(loadStats());
    }

    function setDifficultyDisabled(disabled) {
      presetEl.disabled = disabled;
      rowsEl.disabled = disabled;
      colsEl.disabled = disabled;
      minesInputEl.disabled = disabled;
      applyBtn.disabled = disabled;
    }

    toggleMarkBtn.addEventListener("click", () => {
      markMode = !markMode;
      toggleMarkBtn.textContent = `标记模式：${markMode ? "开" : "关"}`;
    });

    restartBtn.addEventListener("click", () => {
      if (!started || gameOver) return;
      resetBoardKeepTime();
    });

    presetEl.addEventListener("change", () => {
      if (presetEl.value === "custom") return;
      const [r, c, m] = presetEl.value.split("x").map(Number);
      applyConfig(r, c, m);
    });

    applyBtn.addEventListener("click", () => {
      const r = Math.max(6, Math.min(30, Number(rowsEl.value || 16)));
      const c = Math.max(6, Math.min(40, Number(colsEl.value || 30)));
      const m = Math.max(1, Math.min(300, Number(minesInputEl.value || 99)));
      applyConfig(r, c, m);
    });

    syncConfigInputs();
    initBoard();
    renderLeaderboard(loadLeaderboard());
    renderStats(loadStats());

    readyBtn.addEventListener("click", () => {
      if (!roomId) return alert("请先创建或加入房间");
      if (!playerNameEl.value.trim()) return alert("请输入玩家名");
      setReady(true);
    });

    createRoomBtn.addEventListener("click", async () => {
      if (!playerNameEl.value.trim()) return alert("请输入玩家名");
      const code = makeRoomCode();
      roomId = code;
      isHost = true;
      roomDocRef = doc(db, "rooms", roomId);
      playerDocRef = doc(collection(roomDocRef, "players"), playerId);
      const diff = { rows: config.rows, cols: config.cols, mines: config.mines };
      await setDoc(roomDocRef, {
        roomId,
        status: "lobby",
        createdAt: serverTimestamp(),
        hostId: playerId,
        hostName: playerNameEl.value.trim(),
        hostReady: false,
        guestId: null,
        guestName: null,
        guestReady: false,
        difficulty: diff
      });
      await setDoc(playerDocRef, {
        name: playerNameEl.value.trim(),
        progress: 0,
        elapsed: 0,
        deaths: 0
      });
      attachRoomListener();
      roomInfoEl.textContent = `房间 ${roomId}`;
      setDifficultyDisabled(false);
    });

    joinRoomBtn.addEventListener("click", async () => {
      if (!playerNameEl.value.trim()) return alert("请输入玩家名");
      const code = roomCodeEl.value.trim().toUpperCase();
      if (!code) return alert("请输入房间码");
      roomId = code;
      roomDocRef = doc(db, "rooms", roomId);
      const snap = await getDoc(roomDocRef);
      if (!snap.exists()) return alert("房间不存在");
      const data = snap.data();
      if (data.guestId && data.guestId !== playerId) return alert("房间已满");
      if (!data.guestId) {
        await updateDoc(roomDocRef, {
          guestId: playerId,
          guestName: playerNameEl.value.trim(),
          guestReady: false
        });
      }
      isHost = data.hostId === playerId;
      playerDocRef = doc(collection(roomDocRef, "players"), playerId);
      await setDoc(playerDocRef, {
        name: playerNameEl.value.trim(),
        progress: 0,
        elapsed: 0,
        deaths: 0
      }, { merge: true });
      attachRoomListener();
      roomInfoEl.textContent = `房间 ${roomId}`;
      setDifficultyDisabled(true);
    });

    async function setReady(isReady) {
      if (!roomDocRef) return;
      const update = isHost ? { hostReady: isReady, hostName: playerNameEl.value.trim() }
                            : { guestReady: isReady, guestName: playerNameEl.value.trim() };
      await updateDoc(roomDocRef, update);
    }

    function attachRoomListener() {
      if (roomUnsub) roomUnsub();
      roomUnsub = onSnapshot(roomDocRef, (snap) => {
        if (!snap.exists()) return;
        const data = snap.data();
        if (data.difficulty && !started) {
          applyConfig(data.difficulty.rows, data.difficulty.cols, data.difficulty.mines);
        }
        youNameEl.textContent = playerNameEl.value.trim() || "-";
        opNameEl.textContent = getOpponentName(data) || "-";
        youStatusEl.textContent = isHost ? (data.hostReady ? "已就绪" : "未就绪")
                                         : (data.guestReady ? "已就绪" : "未就绪");
        opStatusEl.textContent = isHost ? (data.guestReady ? "已就绪" : "未就绪")
                                        : (data.hostReady ? "已就绪" : "未就绪");
        if (isHost) setDifficultyDisabled(data.hostReady || data.status !== "lobby");
        if (!isHost) setDifficultyDisabled(true);
        if (isHost && data.hostReady && data.guestReady && data.status === "lobby") {
          updateDoc(roomDocRef, { status: "started", startedAt: serverTimestamp() });
        }
        if (data.status === "started" && data.startedAt) {
          if (!started) startMatch(data.startedAt.toMillis());
        }
        if (data.status === "finished" && data.winnerId) {
          if (!gameOver) endMatch(data.winnerId === playerId);
        }
        listenOpponentProgress();
      });
    }

    function startMatch(startedAtMs) {
      started = true;
      gameOver = false;
      matchStartedAt = startedAtMs;
      statusEl.textContent = "进行中";
      myDeaths = 0;
      youDeathsEl.textContent = "0";
      initBoard();
      startTimer();
      sendProgress(true);
    }

    function endMatch(won) {
      gameOver = true;
      statusEl.textContent = won ? "胜利" : "失败";
      stopTimer();
      updateStats(won);
      if (won) updateLeaderboard(elapsed);
    }

    function finishMatch() {
      if (!roomDocRef) return;
      updateDoc(roomDocRef, { status: "finished", winnerId: playerId, finishedAt: serverTimestamp() });
    }

    function hitMine() {
      myDeaths += 1;
      youDeathsEl.textContent = String(myDeaths);
      statusEl.textContent = "踩雷重开";
      resetBoardKeepTime();
    }

    function resetBoardKeepTime() {
      const { rows, cols, mines } = config;
      board = Array.from({ length: rows }, (_, r) =>
        Array.from({ length: cols }, (_, c) => ({ r, c, mine: false, open: false, flag: false, count: 0 }))
      );
      gridEl.innerHTML = "";
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.dataset.r = r;
          cell.dataset.c = c;
          cell.addEventListener("click", onLeftClick);
          cell.addEventListener("dblclick", onDoubleClick);
          cell.addEventListener("contextmenu", onRightClick);
          cell.addEventListener("pointerdown", onPointerDown);
          cell.addEventListener("pointerup", onPointerUp);
          cell.addEventListener("pointercancel", onPointerUp);
          cell.addEventListener("pointerleave", onPointerUp);
          gridEl.appendChild(cell);
        }
      }
      flags = 0;
      openCount = 0;
      boardArmed = false;
      minesEl.textContent = mines;
      sendProgress(true);
    }

    function listenOpponentProgress() {
      if (!roomDocRef) return;
      const playersRef = collection(roomDocRef, "players");
      onSnapshot(playersRef, (snap) => {
        snap.forEach((docSnap) => {
          if (docSnap.id === playerId) return;
          const p = docSnap.data();
          opProgressEl.style.width = `${Math.round((p.progress || 0) * 100)}%`;
          opTimeEl.textContent = (p.elapsed || 0).toFixed(1);
          opDeathsEl.textContent = String(p.deaths || 0);
        });
      });
    }

    function sendProgress(force = false) {
      if (!playerDocRef || !started || gameOver) return;
      const now = Date.now();
      if (!force && now - lastProgressSentAt < 200) return;
      lastProgressSentAt = now;
      const totalSafe = config.rows * config.cols - config.mines;
      const progress = totalSafe > 0 ? openCount / totalSafe : 0;
      youProgressEl.style.width = `${Math.round(progress * 100)}%`;
      updateDoc(playerDocRef, {
        progress,
        elapsed,
        deaths: myDeaths
      });
    }

    function getOpponentName(data) {
      if (isHost) return data.guestName;
      return data.hostName;
    }

    function getOrCreatePlayerId() {
      const key = "ms_player_id";
      let id = localStorage.getItem(key);
      if (!id) {
        id = Math.random().toString(36).slice(2, 10);
        localStorage.setItem(key, id);
      }
      return id;
    }

    function makeRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";
      for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    }
  </script>
</body>
</html>
